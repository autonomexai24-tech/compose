version: '3.8'
name: supabase

services:
  # --- CORE SUPABASE SERVICES ---
  studio:
    image: supabase/studio:2025.12.17-sha-43f4f7f
    restart: unless-stopped
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}

  auth:
    image: supabase/gotrue:v2.184.0
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ${ADDITIONAL_REDIRECT_URLS}
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: 'true'
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: '259051425445-693ef3dqghv75h44mb80kmnab3p0e7i6.apps.googleusercontent.com'
      GOTRUE_EXTERNAL_GOOGLE_SECRET: 'G0CSPX-BYuP3k5MmjeZ0jqHuKwgMEJym_pN'
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: 'https://dhanushpackaging-supabase.ocznup.easypanel.host/auth/v1/callback'

  db:
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data:z
      - db-config:/etc/postgresql-custom

  # --- STORAGE SYSTEM (MINIO / S3) ---
  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: supa-storage
      MINIO_ROOT_PASSWORD: secret1234
    command: server /data --console-address ":9001"
    volumes:
      - ./volumes/minio_data:/data:z

  storage:
    image: supabase/storage-api:v1.33.0
    restart: unless-stopped
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      STORAGE_BACKEND: s3
      GLOBAL_S3_BUCKET: stub
      GLOBAL_S3_ENDPOINT: http://minio:9000
      GLOBAL_S3_PROTOCOL: http
      GLOBAL_S3_FORCE_PATH_STYLE: 'true'
      AWS_ACCESS_KEY_ID: supa-storage
      AWS_SECRET_ACCESS_KEY: secret1234
      IMGPROXY_URL: http://imgproxy:5001

  # --- HELPER SERVICES ---
  kong:
    image: kong:2.8.1
    volumes:
      - ./volumes/api/kong.yml:/home/kong/temp.yml:ro,z
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'

  rest:
    image: postgrest/postgrest:v14.1
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

  vector:
    image: timberio/vector:0.28.1-alpine
    volumes:
      - ./volumes/logs/vector.yml:/etc/vector/vector.yml:ro,z
      - /var/run/docker.sock:/var/run/docker.sock:ro,z

  imgproxy:
    image: darthsim/imgproxy:v3.8.0

  meta:
    image: supabase/postgres-meta:v0.95.1

  realtime:
    image: supabase/realtime:v2.68.0

  functions:
    image: supabase/edge-runtime:v1.69.28

  analytics:
    image: supabase/logflare:1.27.0

  supavisor:
    image: supabase/supavisor:2.7.4

volumes:
  db-config:
